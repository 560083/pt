<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project & Contact Tracker</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest"> 

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.svg">

    <style>
        /* High-contrast, clean global styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        /* Top Action Bar Layout */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 2px solid #334155;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            font-size: 1.8rem;
            color: #38bdf8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Base Configuration Input Filters */
        select, input[type="text"] {
            padding: 10px;
            border-radius: 6px;
            background-color: #1e293b;
            color: white;
            border: 1px solid #475569;
            font-size: 1rem;
            font-weight: bold;
            width: auto;
        }

        select {
            cursor: pointer;
        }

        /* Interactive Buttons Matrix */
        button {
            cursor: pointer;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            transition: transform 0.1s ease, opacity 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-main {
            padding: 10px 16px;
            font-size: 1rem;
            color: white;
        }

        .btn-add { background-color: #10b981; }
        .btn-archive-toggle { background-color: #64748b; }
        .btn-archive-toggle.active { background-color: #f59e0b; color: #000; }
        .btn-export { background-color: #0ea5e9; }
        .btn-import { background-color: #e2e8f0; color: #000; }

        #fileInput { display: none; }

        /* Board Workspace Layer Grid */
        .board {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            flex-grow: 1;
            align-content: start;
        }

        /* Project Entry Tracker Cards */
        .log-card {
            background-color: #1e293b;
            border-radius: 12px;
            padding: 20px;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            border: 2px solid #475569;
        }

        .project-badge {
            display: inline-block;
            background-color: #3b82f6;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            align-self: flex-start;
            margin-bottom: 12px;
        }

        .meeting-notes {
            font-size: 1.1rem;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
            margin-bottom: 15px;
            color: #e2e8f0;
        }

        /* Contact Details Highlight Module */
        .contact-box {
            background-color: #0f172a;
            border: 1px dashed #64748b;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
        }

        .contact-title {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .contact-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: #f1f5f9;
            margin-bottom: 6px;
        }

        .phone-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 6px;
        }

        .contact-phone {
            display: inline-flex;
            align-items: center;
            font-size: 1.1rem;
            font-weight: bold;
            color: #10b981;
            text-decoration: none;
            width: fit-content;
        }

        .contact-phone:hover {
            text-decoration: underline;
        }

        .log-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 10px;
            border-top: 1px solid #334155;
        }

        .log-date {
            font-size: 0.85rem;
            font-weight: bold;
            color: #94a3b8;
        }

        .card-actions button {
            width: 32px;
            height: 32px;
            font-size: 0.9rem;
            margin-left: 6px;
            color: #ffffff;
        }

        .btn-edit { background-color: #475569; }
        .btn-archive-btn { background-color: #f59e0b; color: #000; }
        .btn-delete { background-color: #ef4444; }

        /* Configuration Editor Modal Layout */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: #1e293b;
            border: 2px solid #38bdf8;
            border-radius: 12px;
            padding: 25px;
            width: 90%;
            max-width: 500px;
        }

        .modal-content h3 {
            margin-bottom: 15px;
            color: #38bdf8;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #94a3b8;
            font-weight: bold;
        }

        .form-group select, .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            background-color: #0f172a;
            color: white;
            border: 1px solid #475569;
            font-size: 1rem;
        }

        .form-group textarea {
            height: 80px;
            resize: none;
        }

        #newProjectGroup {
            margin-top: 10px;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            padding: 10px 20px;
        }

        .btn-cancel {
            background-color: #64748b;
            color: white;
        }
    </style>
</head>
<body>

    <header>
	    <!-- <h1 id="boardTitle">Project Track & Call</h1> -->
        <div class="controls">
            <select id="filterProject" onchange="renderBoard()">
                <option value="ALL">All Projects</option>
            </select>
            <button class="btn-main btn-add" id="topAddBtn" onclick="openModal()">+ Log Meeting</button>
            <button class="btn-main btn-archive-toggle" id="toggleArchiveBtn" onclick="toggleView()">View Archive</button>
            <button class="btn-main btn-export" onclick="exportLogsJSON()">Export JSON</button>
            <button class="btn-main btn-import" onclick="triggerImport()">Import JSON</button>
            <input type="file" id="fileInput" accept=".json" onchange="importLogsJSON(event)">
        </div>
    </header>

    <main class="board" id="logBoard"></main>

    <!-- Modal Data Entry Prompt Form -->
    <div class="modal" id="logModal">
        <div class="modal-content">
            <h3 id="modalTitle">New Meeting Entry</h3>
            
            <div class="form-group">
                <label for="selectProjectForm">Choose Project</label>
                <select id="selectProjectForm" onchange="handleFormProjectChange()">
                    <!-- Populated dynamically via JS -->
                </select>
                
                <!-- Hidden by default, toggles on if "New Project..." is selected -->
                <div id="newProjectGroup" style="display: none;">
                    <label for="inputProjectText" style="margin-top: 8px;">New Project Name</label>
                    <input type="text" id="inputProjectText" placeholder="e.g., Office Wifi Upgrade, Solar Plant">
                </div>
            </div>

            <div class="form-group">
                <label for="inputNotes">Meeting Notes / Discussion Summary</label>
                <textarea id="inputNotes" placeholder="What did you discuss? What decisions were made?"></textarea>
            </div>

            <div class="form-group">
                <label for="inputContactName">Contact Person Name</label>
                <input type="text" id="inputContactName" placeholder="e.g., Rajesh Kumar">
            </div>

            <div class="form-group">
                <label for="inputContactPhone">Mobile / Phone Number(s)</label>
                <input type="text" id="inputContactPhone" placeholder="Separate with commas if multiple: e.g., +919876543210, +919900112233">
            </div>

            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-add" onclick="saveLogEntry()">Save Entry</button>
            </div>
        </div>
    </div>

    <script>
        let logs = [];
        let editIdx = null;
        let viewArchivedMode = false;

        window.onload = function() {
            const savedData = localStorage.getItem('project_contact_logs');
            if (savedData) {
                try {
                    logs = JSON.parse(savedData);
                } catch(e) {
                    logs = [];
                }
            } else {
                logs = [
                    { 
                        project: "Server Kernel Upgrade", 
                        notes: "Discussed staging nodes setup. Customer approved execution schedule path.",
                        contactName: "Rajesh Kumar (SysAdmin Head)",
                        contactPhone: "+919876543210",
                        date: "12/03/2026",
                        archived: false
                    },
                    { 
                        project: "Office Wifi Upgrade", 
                        notes: "Met with field technician to track optimal router signal placement boundaries.",
                        contactName: "Anil Murthy (Airtel Rep)",
                        contactPhone: "+919900112233",
                        date: "25/05/2026",
                        archived: false
                    }
                ];
                saveToLocalStorage();
            }
            populateProjectDropdowns();
            renderBoard();
        };

        // Identifies non-duplicate projects to dynamically configure dropdown selections
        function getUniqueProjects() {
            const projectsList = new Set();
            logs.forEach(item => {
                if(item.project && item.project.trim() !== "") {
                    projectsList.add(item.project.trim());
                }
            });
            return Array.from(projectsList).sort();
        }

        // Syncs both the top dashboard filter and the inside-modal project list
        function populateProjectDropdowns() {
            const uniqueProjects = getUniqueProjects();
            
            // 1. Top Bar Filter Dropdown
            const filterDropdown = document.getElementById('filterProject');
            const currentFilterSelection = filterDropdown.value;
            
            filterDropdown.innerHTML = '<option value="ALL">All Projects</option>';
            uniqueProjects.forEach(proj => {
                const opt = document.createElement('option');
                opt.value = proj;
                opt.textContent = proj;
                filterDropdown.appendChild(opt);
            });
            filterDropdown.value = currentFilterSelection || "ALL";

            // 2. Modal Form Dropdown
            const formDropdown = document.getElementById('selectProjectForm');
            formDropdown.innerHTML = '<option value="NEW_PROJECT">-- Create New Project --</option>';
            uniqueProjects.forEach(proj => {
                const opt = document.createElement('option');
                opt.value = proj;
                opt.textContent = proj;
                formDropdown.appendChild(opt);
            });
        }

        // Toggles visibility of text input if adding a brand new project string
        function handleFormProjectChange() {
            const formDropdown = document.getElementById('selectProjectForm');
            const newProjectGroup = document.getElementById('newProjectGroup');
            
            if (formDropdown.value === "NEW_PROJECT") {
                newProjectGroup.style.display = 'block';
                document.getElementById('inputProjectText').required = true;
            } else {
                newProjectGroup.style.display = 'none';
                document.getElementById('inputProjectText').required = false;
            }
        }

        function renderBoard() {
            const board = document.getElementById('logBoard');
            const targetFilter = document.getElementById('filterProject').value;
            board.innerHTML = '';

            const titleEl = document.getElementById('boardTitle');
            const toggleBtn = document.getElementById('toggleArchiveBtn');
            const addBtn = document.getElementById('topAddBtn');

            if (viewArchivedMode) {
                titleEl.textContent = "Archived Project Logs";
                toggleBtn.textContent = "View Active Tracker";
                toggleBtn.classList.add('active');
                addBtn.style.display = 'none';
            } else {
                titleEl.textContent = "Project Track & Call";
                toggleBtn.textContent = "View Archive";
                toggleBtn.classList.remove('active');
                addBtn.style.display = 'inline-flex';
            }

            logs.forEach((entry, idx) => {
                const isArchived = entry.archived || false;
                if (isArchived !== viewArchivedMode) return;
                if (targetFilter !== "ALL" && entry.project.trim() !== targetFilter) return;

                const card = document.createElement('div');
                card.className = 'log-card';

                const badge = document.createElement('div');
                badge.className = 'project-badge';
                badge.textContent = entry.project;

                const notesDiv = document.createElement('div');
                notesDiv.className = 'meeting-notes';
                notesDiv.textContent = entry.notes;

                card.appendChild(badge);
                card.appendChild(notesDiv);

                if (entry.contactName || entry.contactPhone) {
                    const contactBox = document.createElement('div');
                    contactBox.className = 'contact-box';
                    contactBox.innerHTML = '<div class="contact-title">Contact Connected</div>';

                    if (entry.contactName) {
                        const nameEl = document.createElement('div');
                        nameEl.className = 'contact-name';
                        nameEl.textContent = entry.contactName;
                        contactBox.appendChild(nameEl);
                    }

                    if (entry.contactPhone) {
                        const phoneContainer = document.createElement('div');
                        phoneContainer.className = 'phone-container';

                        const dynamicNumbers = entry.contactPhone.split(',');
                        dynamicNumbers.forEach(num => {
                            const trimmedNum = num.trim();
                            if (trimmedNum === "") return;

                            const phoneLink = document.createElement('a');
                            phoneLink.className = 'contact-phone';
                            const cleanPhone = trimmedNum.replace(/\s+/g, '');
                            phoneLink.href = `tel:${cleanPhone}`;
                            phoneLink.textContent = `📞 ${trimmedNum}`;
                            phoneLink.title = `Tap to call ${trimmedNum}`;
                            phoneContainer.appendChild(phoneLink);
                        });

                        contactBox.appendChild(phoneContainer);
                    }

                    card.appendChild(contactBox);
                }

                const footer = document.createElement('div');
                footer.className = 'log-footer';

                const dateSpan = document.createElement('span');
                dateSpan.className = 'log-date';
                dateSpan.textContent = `Met: ${entry.date || 'Unknown'}`;

                const actionDiv = document.createElement('div');
                actionDiv.className = 'card-actions';

                if (!viewArchivedMode) {
                    const editBtn = document.createElement('button');
                    editBtn.className = 'btn-edit';
                    editBtn.textContent = 'E';
                    editBtn.onclick = () => editLogEntry(idx);
                    actionDiv.appendChild(editBtn);
                }

                const archiveBtn = document.createElement('button');
                archiveBtn.className = 'btn-archive-btn';
                archiveBtn.textContent = viewArchivedMode ? 'R' : 'A';
                archiveBtn.onclick = () => toggleArchiveStatus(idx);
                actionDiv.appendChild(archiveBtn);

                const delBtn = document.createElement('button');
                delBtn.className = 'btn-delete';
                delBtn.textContent = '-';
                delBtn.onclick = () => deleteLogEntry(idx);
                actionDiv.appendChild(delBtn);
                
                footer.appendChild(dateSpan);
                footer.appendChild(actionDiv);
                
                card.appendChild(footer);
                board.appendChild(card);
            });
        }

        function toggleView() {
            viewArchivedMode = !viewArchivedMode;
            renderBoard();
        }

        function toggleArchiveStatus(idx) {
            logs[idx].archived = !logs[idx].archived;
            saveToLocalStorage();
            renderBoard();
        }

        function openModal() {
            editIdx = null;
            document.getElementById('modalTitle').textContent = 'New Meeting Entry';
            
            // Refresh options lists state securely
            populateProjectDropdowns();
            
            document.getElementById('selectProjectForm').value = 'NEW_PROJECT';
            document.getElementById('inputProjectText').value = '';
            document.getElementById('inputNotes').value = '';
            document.getElementById('inputContactName').value = '';
            document.getElementById('inputContactPhone').value = '';
            
            handleFormProjectChange();
            document.getElementById('logModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('logModal').style.display = 'none';
        }

        function saveLogEntry() {
            const formDropdown = document.getElementById('selectProjectForm');
            let project = "";

            if (formDropdown.value === "NEW_PROJECT") {
                project = document.getElementById('inputProjectText').value.trim();
            } else {
                project = formDropdown.value;
            }

            const notes = document.getElementById('inputNotes').value.trim();
            const contactName = document.getElementById('inputContactName').value.trim();
            const contactPhone = document.getElementById('inputContactPhone').value.trim();

            if (!project) {
                alert("Project Name is mandatory to properly index data.");
                return;
            }

            if (editIdx !== null) {
                const originalDate = logs[editIdx].date || new Date().toLocaleDateString('en-GB');
                const originalArchiveState = logs[editIdx].archived || false;
                logs[editIdx] = { project, notes, contactName, contactPhone, date: originalDate, archived: originalArchiveState };
            } else {
                const dateStr = new Date().toLocaleDateString('en-GB');
                logs.unshift({ project, notes, contactName, contactPhone, date: dateStr, archived: false });
            }

            saveToLocalStorage();
            populateProjectDropdowns();
            renderBoard();
            closeModal();
        }

        function editLogEntry(idx) {
            editIdx = idx;
            const target = logs[idx];
            document.getElementById('modalTitle').textContent = 'Edit Log Entry';
            
            populateProjectDropdowns();
            
            const formDropdown = document.getElementById('selectProjectForm');
            
            // Match dropdown context choice or switch fallback route
            if (getUniqueProjects().includes(target.project)) {
                formDropdown.value = target.project;
                document.getElementById('newProjectGroup').style.display = 'none';
            } else {
                formDropdown.value = 'NEW_PROJECT';
                document.getElementById('inputProjectText').value = target.project;
                document.getElementById('newProjectGroup').style.display = 'block';
            }

            document.getElementById('inputNotes').value = target.notes;
            document.getElementById('inputContactName').value = target.contactName || '';
            document.getElementById('inputContactPhone').value = target.contactPhone || '';
            document.getElementById('logModal').style.display = 'flex';
        }

        function deleteLogEntry(idx) {
            const msg = viewArchivedMode ? "Permanently erase this archived log entry?" : "Permanently erase this timeline log entry?";
            if(confirm(msg)) {
                logs.splice(idx, 1);
                saveToLocalStorage();
                populateProjectDropdowns();
                renderBoard();
            }
        }

        function saveToLocalStorage() {
            localStorage.setItem('project_contact_logs', JSON.stringify(logs));
        }

        function exportLogsJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(logs, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `project_logs_backup_${new Date().toISOString().slice(0,10)}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function triggerImport() {
            document.getElementById('fileInput').click();
        }

        function importLogsJSON(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsedData = JSON.parse(e.target.result);
                    if (Array.isArray(parsedData)) {
                        logs = parsedData;
                        saveToLocalStorage();
                        populateProjectDropdowns();
                        renderBoard();
                        alert("Project timeline logs synced and loaded successfully!");
                    } else {
                        alert("Invalid data template schema layout.");
                    }
                } catch(err) {
                    alert("Error processing file contents.");
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }
    </script>
</body>
</html>
