<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Edge-to-edge square background block so Android crops it perfectly -->
  <rect width="512" height="512" fill="#10b981"/>
  
  <!-- "PT" Core Typography centered inside the Android Safe Zone -->
  <text x="50%" y="53%" 
        dominant-baseline="middle" 
        text-anchor="middle" 
        font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" 
        font-size="175" 
        font-weight="900" 
        fill="#0f172a" 
        letter-spacing="-5">PT</text>
</svg>
